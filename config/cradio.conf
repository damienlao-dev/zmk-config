conf

CONFIG_ZMK_KEYBOARD_NAME="Cradio"

# Mouse Settings
CONFIG_ZMK_MOUSE=y

# Mouse movement speed (default 600)
CONFIG_ZMK_MOUSE_TICK_DURATION=8

# Uncomment to enable smooth scrolling
# CONFIG_ZMK_MOUSE_SMOOTH_SCROLLING=y

# BLE settings for better responsiveness
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Increase BLE transmit power for better range
CONFIG_BT_MAX_CONN=5

# Deep sleep after 15 minutes of inactivity
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Debounce settings (adjust if keys feel bouncy)
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5
